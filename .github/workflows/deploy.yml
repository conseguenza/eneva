name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create config.js from secret
        run: |
          mkdir -p assets/js
          echo "// This file is auto-generated during build" > assets/js/config.js
          echo "export const TMDB_READ_ACCESS_TOKEN = \"${{ secrets.TMDB_READ_ACCESS_TOKEN }}\";" >> assets/js/config.js
          echo "export const TMDB_LANGUAGE = \"it-IT\";" >> assets/js/config.js
          echo "export const TMDB_REGION = \"IT\";" >> assets/js/config.js
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
